<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta author="Emerson Moron Rosa">
    <title>Testes funções</title>
</head>
<body>
    <main>
        <h1>Testes de funções matemáticas</h1>
        <h2>Soma</h2>
        <label for="primeiro-numero">Digite o primeiro número:</label>
        <input type="number" id="primeiro-numero">
        <br>
        <label for="segundo-numero">Digite o segundo número:</label>
        <input type="number" id="segundo-numero">
        <br>
        
  
        <button onclick="soma()">Soma</button>
        <button onclick="subtracao()">Subtração</button>
        <button onclick="multiplicacao()">Multiplicação</button>
        <button onclick="divisao()">Divisão</button>
        <br>
        <p>Seu resultado é: <strong id="resultado"></strong></p>
        
        <section id="imposto">
            <h3>Imposto</h3>
            <label for="valor-compra">Digite o valor da compra:</label>
            <input type="number" id="valor-compra">
            <br>
            <label for="cotacao">Digite a cotação do dólar:</label>
            <input type="number" id="cotacao">
            <br>
            <button onclick="baseCalculo()">Base de Cálculo</button>
            <button type="button" onclick="imposto()">Calcular Imposto</button>
            <p>Sua base de cálculo é: <strong id="baseCalculo"></strong></p>
            <p>O valor total da sua compra é: <strong id="valorTotal"></strong></p>
        </section>

        <section id="historico">
            <h3>Histórico</h3>
            <ul id="lista-historico"></ul>
            <button type="button" onclick="limparHistorico()">Limpar histórico</button>
        </section>

         <script src="js/funcoes.js"></script>

           
        </main>
    
</body>
</html>
